height:100%;

display:flex;
justify-content:center;
align-items:center;

.login-box {
    background: #111;
    padding: 40px;
    border-radius: 20px;
    width: 320px;

    width: 100%;

    margin: 10px 0;

    color: white;

    border-radius: 10px;

padding:20px;

cursor:pointer;
}

.card{

border-radius:15px;

<script>

// ================= XSS PROTECTION =================
function sanitize(str) {
    if (!str) return "";
    return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#x27;");
}

// LOGIN - حقيقي عبر السيرفر
async function login(){
    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value.trim();
    let errEl = document.getElementById("error");

    if(!username || !password){ errEl.innerText = "Please enter username and password"; return; }

    let res = await fetch("/admin-login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ username, password })
    });
    let data = await res.json();

    if(data.success && data.token){
        // حفظ التوكن في memory فقط (لا localStorage)
        _adminToken = data.token;
        await fetchCsrfToken();
        document.getElementById("loginPage").style.display = "none";
    } else {
        errEl.innerText = "Wrong username or password";
    }
}

// التوكن في memory فقط - لا localStorage
var _adminToken = "";
var _csrfToken = "";

// جلب CSRF token من السيرفر
async function fetchCsrfToken(){
    try {
        let res = await fetch("/csrf-token", { credentials: "include" });
        let data = await res.json();
        if(data.token) _csrfToken = data.token;
    } catch {}
}

// دالة مساعدة لإرسال requests بالتوكن + cookie
function adminFetch(url, options = {}){
    let opts = Object.assign({}, options);
    opts.headers = Object.assign({}, options.headers || {});
    if(_adminToken) opts.headers["Authorization"] = "Bearer " + _adminToken;
    if(_csrfToken)  opts.headers["X-CSRF-Token"] = _csrfToken;
    opts.credentials = "include";
    return fetch(url, opts);
}

// AUTO LOGIN - تحقق حقيقي مع السيرفر + استرجاع التوكن
async function checkAutoLogin(){
    try {
        let res = await fetch("/admin/verify", { credentials: "include" });
        let data = await res.json();
        if(data.valid){
            // نطلب توكن جديد بالـ cookie الموجود
            let tokenRes = await fetch("/admin/refresh-token", { credentials: "include" });
            let tokenData = await tokenRes.json();
            if(tokenData.token){
                _adminToken = tokenData.token;
                await fetchCsrfToken();
            }
            document.getElementById("loginPage").style.display = "none";
        }
    } catch {}
}
checkAutoLogin();

// ================= NOTIFICATION SYSTEM =================
// نحفظ آخر عدد رأيناه - نبدأ بـ -1 حتى نعرف أنه أول مرة
var _prevDeposits  = -1;
var _prevWithdraws = -1;
var _prevStores    = -1;
var _prevOrders    = -1;
var _prevUsers     = -1;
var _prevMessages  = -1;
var _adminLastSeenSupport = parseInt(localStorage.getItem("adminLastSeenSupport") || "0");

// ===== أصوات بصوت بشري =====
var _speechReady = false;
var _speechQueue = [];
var _isSpeaking = false;

var _speechTexts = {
    deposit:  "You have a new deposit request, please review it",
    withdraw: "You have a new withdrawal request, please review it",
    message:  "You have a new message from a customer",
    store:    "You have a new store application waiting for approval",
    order:    "You have a new order",
    user:     "A new user has registered"
};

function _speakNext(){
    if(_isSpeaking || _speechQueue.length === 0) return;
    var text = _speechQueue.shift();
    _isSpeaking = true;
    var msg = new SpeechSynthesisUtterance(text);
    msg.lang   = "en-US";
    msg.rate   = 0.85;
    msg.pitch  = 1.3;
    msg.volume = 1.0;
    var voices = window.speechSynthesis.getVoices();
    var femaleVoice = voices.find(function(v){
        return v.name === "Samantha" ||
               v.name === "Victoria" ||
               v.name === "Karen"    ||
               v.name === "Zira"     ||
               v.name.toLowerCase().includes("female");
    }) || voices.find(function(v){
        return v.lang === "en-US" || v.lang === "en_US";
    });
    if(femaleVoice) msg.voice = femaleVoice;
    msg.onend = function(){
        _isSpeaking = false;
        setTimeout(_speakNext, 300);
    };
    msg.onerror = function(){
        _isSpeaking = false;
        setTimeout(_speakNext, 300);
    };
    window.speechSynthesis.speak(msg);
}

function playSound(type){
    if(!_speechReady) return;
    if(!window.speechSynthesis) return;
    var text = _speechTexts[type] || type;
    _speechQueue.push(text);
    _speakNext();
}

// فتح الصوت عند أول نقرة
document.addEventListener("click", function(){
    if(_speechReady) return;
    if(!window.speechSynthesis) return;
    // نرسل رسالة فارغة لفتح الصوت
    var unlock = new SpeechSynthesisUtterance(" ");
    unlock.volume = 0.01;
    unlock.onend = function(){ _speechReady = true; };
    window.speechSynthesis.speak(unlock);
}, false);

// تحميل الأصوات
if(window.speechSynthesis){
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = function(){
        window.speechSynthesis.getVoices();
    };
}

// ===== Badge helper =====
function setBadge(id, count){
    var el = document.getElementById(id);
    if(!el) return;
    if(count > 0){
        el.style.display = "flex";
        el.innerText = count > 99 ? "99+" : String(count);
    } else {
        el.style.display = "none";
        el.innerText = "";
    }
}

// ===== فحص كل 5 ثوان =====
async function checkAllNotifications(){
    try {
        // --- 1. الإيداعات والسحوبات ---
        var reqRes = await adminFetch("/all-requests");
        var reqs   = await reqRes.json();
        var deposits  = reqs.filter(function(r){ return r.type==="recharge" && r.status==="pending"; }).length;
        var withdraws = reqs.filter(function(r){ return r.type==="withdraw" && r.status==="pending"; }).length;

        if(_prevDeposits !== -1 && deposits > _prevDeposits)   playSound("deposit");
        if(_prevWithdraws !== -1 && withdraws > _prevWithdraws) playSound("withdraw");

        setBadge("badgeWallet", deposits + withdraws);
        _prevDeposits  = deposits;
        _prevWithdraws = withdraws;

        // --- 2. المتاجر ---
        var storeRes = await adminFetch("/all-store-applications");
        var stores   = await storeRes.json();
        var pending  = stores.filter(function(s){ return s.status==="pending"; }).length;

        if(_prevStores !== -1 && pending > _prevStores) playSound("store");
        setBadge("badgeStores", pending);
        _prevStores = pending;

        // --- 3. الأوردرات ---
        var orderRes = await adminFetch("/all-orders");
        var orders   = await orderRes.json();
        var orderCount = orders.length;

        if(_prevOrders !== -1 && orderCount > _prevOrders) playSound("order");
        var newOrders = _prevOrders === -1 ? 0 : orderCount - _prevOrders;
        setBadge("badgeOrders", newOrders > 0 ? newOrders : 0);
        _prevOrders = orderCount;

        // --- 4. المستخدمون ---
        var userRes = await adminFetch("/admin/users");
        var usrs    = await userRes.json();
        var userCount = usrs.length;

        if(_prevUsers !== -1 && userCount > _prevUsers) setBadge("badgeUsers", userCount - _prevUsers);
        _prevUsers = userCount;

        // --- 5. الرسائل ---
        var msgRes  = await adminFetch("/admin-support-unread?lastSeen=" + _adminLastSeenSupport);
        var msgData = await msgRes.json();
        if(_prevMessages !== -1 && msgData.count > _prevMessages) playSound("message");
        _prevMessages = msgData.count;
        setBadge("adminSupportBadge", msgData.count);

    } catch(e){ console.log("notification error:", e); }
}

setTimeout(function(){
    checkAllNotifications();
    setInterval(checkAllNotifications, 5000);
}, 3000);


async function deleteUser(email){
    if(!confirm('Delete user ' + email + '? This cannot be undone.')) return;
    let res = await adminFetch('/delete-user', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email: email })
    });
    let data = await res.json();
    if(data.success){
        alert('User deleted 🗑️');
        showPage('users');
    } else {
        alert('Error ❌');
    }
}

function editUser(email){

    let newEmail = prompt("Enter new email:", email);
    let newPass = prompt("Enter new password:");

    if(!newEmail && !newPass) return;

    adminFetch("/edit-user", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            oldEmail: email,
            newEmail: newEmail,
            newPassword: newPass
        })
    })
    .then(res => res.json())
    .then(data => {
        if(data.success){
            alert("Updated successfully ✅");
            showPage("users");
        } else {
            alert("Error ❌");
        }
    });

}

// LOGOUT
function logout(){
    _adminToken = "";
    // مسح الـ cookie من السيرفر
    fetch("/logout", { method: "POST", credentials: "include" }).finally(() => {

    });
}

function saveCode(){
    let code = document.getElementById("inviteCode").value.trim();
    let msg = document.getElementById("codeMsg");
    if(!code || code.length < 3){
        if(msg) msg.innerHTML = "<span style='color:red;'>❌ Code must be at least 3 characters</span>";
        return;
    }
    adminFetch("/set-invite-code", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ code: code })
    })
    .then(r => r.json())
    .then(data => {
        if(data.success){
            var display = document.getElementById("currentCodeDisplay");
            if(display) display.innerText = data.code;
            document.getElementById("inviteCode").value = "";
            if(msg) msg.innerHTML = "<span style='color:green;'>✅ Invite code updated to: <b>" + data.code + "</b></span>";
        } else {
            if(msg) msg.innerHTML = "<span style='color:red;'>❌ " + (data.message||"Error") + "</span>";
        }
    })
    .catch(() => { if(msg) msg.innerHTML = "<span style='color:red;'>❌ Failed to connect to server</span>"; });
}

let currentChat = "";

// فتح محادثة
function openChat(email){
    currentChat = email;

    document.getElementById("chatBox").style.display = "block";
    document.getElementById("chatUser").innerText = email;

    loadMessages();
}

// تحميل الرسائل
function loadMessages(){
    adminFetch("/get-messages/" + currentChat)
    .then(res => res.json())
    .then(data => {

        let box = document.getElementById("messages");
        box.innerHTML = "";

        data.forEach(m => {
            let div = document.createElement("div");
            div.style.margin = "5px";

            if(m.sender === "admin"){
                div.style.textAlign = "right";
                div.innerHTML = "<b>You:</b> " + sanitize(m.text);
            }else{
                div.innerHTML = "<b>User:</b> " + sanitize(m.text);
            }

            box.appendChild(div);
        });

        box.scrollTop = box.scrollHeight;
    });
}

function sendReply(){
    let text = document.getElementById("reply").value;

    if(!text) return;

    adminFetch("/send-message", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
               email: currentChat,
               text: text,
               sender: "admin"
             })
    })
    .then(res => res.json())
    .then(data => {
        if(data.success){
            document.getElementById("reply").value = "";
            loadMessages();
        } else {
            alert("Error sending ❌");
        }
    });
}

    let res = await adminFetch("/admin/users");
    let data = await res.json();

    currentWalletUser = user;

    if(!user) return;

    document.getElementById("walletPanel").style.display = "block";
    document.getElementById("walletUserEmail").innerText = email;

    document.getElementById("balanceInput").value = user.balance;
    document.getElementById("usdtInput").value = user.usdt || "";

    loadDeposits();
    loadWithdraws();
}

// ===== LOGS FUNCTIONS =====
var _allLogs = [];

async function loadLogs(){
    let container = document.getElementById("logsList");
    try {
        let res = await adminFetch("/admin/logs");
        let data = await res.json();
        _allLogs = data;
        renderLogs(_allLogs);
    } catch(e) {
        if(container) container.innerHTML = "<p style='color:red;'>Failed to load logs.</p>";
    }
}

function renderLogs(logs){
    let container = document.getElementById("logsList");
    if(!container) return;
    if(logs.length === 0){
        container.innerHTML = "<p style='color:#999;text-align:center;padding:20px;'>No logs found.</p>";
        return;
    }
    let colors = {
        login:"#e8f5e9", login_failed:"#ffebee", register:"#e3f2fd",
        admin_login:"#f3e5f5", admin_login_failed:"#ffebee",
        deposit_approved:"#e8f5e9", withdraw_approved:"#fff3e0",
        request_rejected:"#ffebee"
    };
    container.innerHTML = logs.map(l => `
        <div style="padding:10px 14px;border-radius:8px;margin-bottom:6px;background:${colors[l.type]||'#f5f5f5'};font-size:13px;">
            <span style="color:#999;font-size:11px;">${l.time}</span>
            <b style="margin-left:8px;">${l.type}</b>
            <span style="margin-left:8px;color:#333;">${l.details}</span>
            ${l.email ? `<span style="color:#1976d2;margin-left:8px;">(${l.email})</span>` : ""}
        </div>
    `).join("");
}

function filterLogs(){
    let search = (document.getElementById("logSearch")?.value || "").toLowerCase();
    let type   = document.getElementById("logType")?.value || "";
    let filtered = _allLogs.filter(l => {
        let matchType   = !type   || l.type === type;
        let matchSearch = !search || l.details.toLowerCase().includes(search) || (l.email||"").toLowerCase().includes(search);
        return matchType && matchSearch;
    });
    renderLogs(filtered);
}

// ===== ORDERS ADMIN FUNCTIONS =====
var _sLabels = {waiting_payment:'Waiting Payment',waiting_shipping:'Waiting Shipping',shipped:'Shipped',completed:'Completed',refund:'Refund'};
var _sBg     = {waiting_payment:'#fff3cd',waiting_shipping:'#cce5ff',shipped:'#d4edda',completed:'#d1ecf1',refund:'#f8d7da'};
var _sCol    = {waiting_payment:'#856404',waiting_shipping:'#004085',shipped:'#155724',completed:'#0c5460',refund:'#721c24'};

async function loadAllOrders(){
  var container = document.getElementById('adminOrdersList');
  if(!container) return;
  container.innerHTML = 'Loading...';
  var res = await adminFetch('/all-orders');
  var data = await res.json();
  data = data.reverse();
  var emailF  = (document.getElementById('orderSearchEmail')||{}).value||'';
  var statusF = (document.getElementById('orderStatusFilter')||{}).value||'';
  if(emailF)  data = data.filter(function(o){return o.email.toLowerCase().includes(emailF.toLowerCase());});
  if(statusF) data = data.filter(function(o){return o.status===statusF;});
  if(data.length===0){container.innerHTML='<p style="color:#999;text-align:center;padding:30px;">No orders found.</p>';return;}
  container.innerHTML = data.map(function(o){
    var bg  = _sBg[o.status]||'#eee';
    var col = _sCol[o.status]||'#333';
    var lbl = _sLabels[o.status]||o.status;
    var opts = ['waiting_payment','waiting_shipping','shipped','completed','refund'].map(function(s){
      return '<option value="'+s+'"'+(o.status===s?' selected':'')+'>'+_sLabels[s]+'</option>';
    }).join('');
    return '<div style="border:1px solid #ddd;border-radius:12px;padding:15px;margin-bottom:12px;background:#fafafa;">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:12px;">'+
        '<div>'+
          '<div style="font-weight:bold;font-size:15px;">'+o.productTitle+'</div>'+
          '<div style="color:#666;font-size:13px;">&#128231; '+o.email+'</div>'+
          '<div style="color:#1976d2;font-weight:bold;">$'+parseFloat(o.productPrice).toFixed(2)+' &times; '+(o.quantity||1)+'</div>'+
          '<div style="font-size:11px;color:#999;">'+o.createdAt+'</div>'+
          (o.profit>0?'<div style="color:#28a745;font-size:13px;font-weight:bold;">+ $'+parseFloat(o.profit).toFixed(2)+' profit</div>':'')+
        '</div>'+
        '<span style="background:'+bg+';color:'+col+';padding:4px 12px;border-radius:20px;font-size:12px;font-weight:bold;">'+lbl+'</span>'+
      '</div>'+
      '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">'+
        '<select id="sel_'+o.id+'" style="padding:8px;border-radius:8px;border:1px solid #ccc;font-size:13px;">'+opts+'</select>'+
        '<input id="profit_'+o.id+'" type="number" placeholder="Profit $" value="'+(o.profit||o.productPrice||'')+'" style="width:100px;padding:8px;border-radius:8px;border:1px solid #ccc;font-size:13px;">'+
        '<button onclick="updateOrderStatus('+o.id+')" style="padding:8px 14px;background:#1976d2;color:white;border:none;border-radius:8px;cursor:pointer;">&#9998; Update</button>'+
        '<button onclick="deleteOrder('+o.id+')" style="padding:8px 14px;background:#dc3545;color:white;border:none;border-radius:8px;cursor:pointer;">&#128465; Delete</button>'+
      '</div>'+
    '</div>';
  }).join('');
}

async function updateOrderStatus(id){
  var status = document.getElementById('sel_'+id).value;
  var profit = parseFloat(document.getElementById('profit_'+id).value)||0;
  var res = await adminFetch('/update-order-status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id,status:status,profit:profit})});
  var data = await res.json();
  if(data.success){
    alert('Order updated successfully! ✅'+(status==='completed'?' \n$'+profit.toFixed(2)+' profit added to user balance & wallet':''));
    loadAllOrders();
  } else { alert('Error ❌'); }
}

async function deleteOrder(id){
  if(!confirm('Delete this order?')) return;
  var res = await adminFetch('/delete-order',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id})});
  var data = await res.json();
  if(data.success){ loadAllOrders(); }
}

async function addManualOrder(){
  var email = document.getElementById('newOrderEmail').value.trim();
  var title = document.getElementById('newOrderTitle').value.trim();
  var price = parseFloat(document.getElementById('newOrderPrice').value)||0;
  var qty   = parseInt(document.getElementById('newOrderQty').value)||1;
  if(!email||!title){ alert('Please enter email and product title'); return; }
  var res = await adminFetch('/create-order',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,productTitle:title,productPrice:price,quantity:qty})});
  var data = await res.json();
  if(data.success){ alert('Order created ✅'); loadAllOrders(); }
  else { alert('Error ❌'); }
}
</script>
